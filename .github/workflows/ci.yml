name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build (maven)
        run: |
          ./mvnw -T 1C clean package -DskipTests

      - name: Build Docker image
        if: success()
        run: |
          docker build -f infrastructure/Dockerfile -t transfer-service:ci .
